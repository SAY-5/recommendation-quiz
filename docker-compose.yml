services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recommendation_quiz
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d recommendation_quiz"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgres://quiz:quiz@postgres:5432/recommendation_quiz
      DJANGO_SECRET_KEY: dev-only-not-for-production
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./apps/web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
